<svg class="diagram" viewBox="0 0 760 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Virtual to physical address translation via the Container Table">
  <defs>
    <marker id="va-arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path class="dg-arrowhead" d="M0,0 L7,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- VLCN -->
  <rect class="dg-box-accent" x="10" y="58" width="140" height="60" rx="9"/>
  <text class="dg-title" x="80" y="84" text-anchor="middle" font-size="14" font-weight="700">VLCN</text>
  <text class="dg-muted" x="80" y="104" text-anchor="middle" font-size="11">virtual cluster</text>

  <line class="dg-line" x1="150" y1="88" x2="294" y2="88" marker-end="url(#va-arrow)"/>
  <text class="dg-muted" x="222" y="80" text-anchor="middle" font-size="10.5">&gt;&gt; shift = container id</text>

  <!-- Container Table -->
  <rect class="dg-box" x="300" y="34" width="180" height="108" rx="9"/>
  <text class="dg-title" x="390" y="56" text-anchor="middle" font-size="13" font-weight="700">Container Table</text>
  <line class="dg-line" x1="312" y1="64" x2="468" y2="64" stroke-width="1"/>
  <text class="dg-muted" x="320" y="82" font-size="11">cid → physical base</text>
  <text class="dg-muted" x="320" y="100" font-size="11">0 → CSC₀</text>
  <text class="dg-muted" x="320" y="116" font-size="11">1 → CSC₁</text>
  <text class="dg-muted" x="320" y="132" font-size="11">… → …</text>

  <line class="dg-line" x1="480" y1="88" x2="604" y2="88" marker-end="url(#va-arrow)"/>
  <text class="dg-muted" x="542" y="80" text-anchor="middle" font-size="10.5">+ (VLCN &amp; mask)</text>

  <!-- PLCN -->
  <rect class="dg-box-accent" x="610" y="58" width="140" height="60" rx="9"/>
  <text class="dg-title" x="680" y="84" text-anchor="middle" font-size="14" font-weight="700">PLCN</text>
  <text class="dg-muted" x="680" y="104" text-anchor="middle" font-size="11">physical cluster</text>

  <!-- formula -->
  <text class="dg-text" x="380" y="186" text-anchor="middle" font-size="12.5">PLCN = ContainerTable[ VLCN &gt;&gt; shift ] + ( VLCN &amp; mask )</text>
</svg>

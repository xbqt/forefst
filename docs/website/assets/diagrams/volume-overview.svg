<rect class="dg-box" x="200" y="226" width="150" height="46" rx="7"/><text class="dg-text" x="275" y="248" text-anchor="middle" font-size="12">Directories</text><text class="dg-muted" x="275" y="264" text-anchor="middle" font-size="10.5">B+-trees</text>

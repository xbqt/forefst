<svg class="diagram" viewBox="0 0 760 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The verification loop">
<defs><marker id="vl-a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path class="dg-arrowhead" d="M0,0 L7,3 L0,6 Z"/></marker></defs>
<rect class="dg-box" x="14"  y="50" width="130" height="48" rx="7"/><text class="dg-text" x="79" y="78" text-anchor="middle" font-size="11.5">claim</text>
<rect class="dg-box" x="180" y="50" width="150" height="48" rx="7"/><text class="dg-text" x="255" y="72" text-anchor="middle" font-size="11">static analysis</text><text class="dg-muted" x="255" y="88" text-anchor="middle" font-size="10">decompiled code</text>
<rect class="dg-box" x="366" y="50" width="150" height="48" rx="7"/><text class="dg-text" x="441" y="72" text-anchor="middle" font-size="11">disk measurement</text><text class="dg-muted" x="441" y="88" text-anchor="middle" font-size="10">raw bytes, all images</text>
<rect class="dg-box-accent" x="552" y="50" width="190" height="48" rx="7"/><text class="dg-accent" x="647" y="72" text-anchor="middle" font-size="11.5" font-weight="700">confirmed / corrected</text><text class="dg-muted" x="647" y="88" text-anchor="middle" font-size="10">both must agree</text>
<line class="dg-line" x1="144" y1="74" x2="176" y2="74" marker-end="url(#vl-a)"/>
<line class="dg-line" x1="330" y1="74" x2="362" y2="74" marker-end="url(#vl-a)"/>
<line class="dg-line" x1="516" y1="74" x2="548" y2="74" marker-end="url(#vl-a)"/>
<path class="dg-dash" d="M441 98 C441 140, 255 140, 255 100" marker-end="url(#vl-a)"/>
<text class="dg-muted" x="348" y="150" text-anchor="middle" font-size="10">mismatch → re-measure (default: "not confirmed")</text>
</svg>

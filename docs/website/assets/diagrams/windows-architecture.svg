<svg class="diagram" viewBox="0 0 760 516" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Simplified Windows architecture relevant to file-system processing">
  <defs>
    <marker id="wa-ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path class="dg-arrowhead" d="M0,0 L7,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- ===== User-mode top row ===== -->
  <g text-anchor="middle" font-size="10">
    <rect class="dg-box" x="106" y="12" width="118" height="36" rx="4"/>
    <text class="dg-text" x="165" y="29">Environment</text><text class="dg-text" x="165" y="42">subsystems</text>
    <rect class="dg-box" x="246" y="12" width="118" height="36" rx="4"/>
    <text class="dg-text" x="305" y="29">System</text><text class="dg-text" x="305" y="42">processes</text>
    <rect class="dg-box" x="386" y="12" width="118" height="36" rx="4"/>
    <text class="dg-text" x="445" y="35">Services</text>
    <rect class="dg-box" x="526" y="12" width="118" height="36" rx="4"/>
    <text class="dg-text" x="585" y="35">Applications</text>
  </g>

  <!-- Subsystem DLLs + ntdll -->
  <rect class="dg-box" x="90" y="64" width="580" height="34" rx="4"/>
  <text class="dg-text" x="380" y="85" text-anchor="middle" font-size="11.5">Subsystem DLLs / Win32 API</text>
  <rect class="dg-box" x="90" y="112" width="580" height="34" rx="4"/>
  <text class="dg-text" x="380" y="133" text-anchor="middle" font-size="11.5"><tspan font-family="'JetBrains Mono',monospace">ntdll.dll</tspan> — system service dispatch stubs</text>

  <!-- arrows: top row -> DLLs, DLLs -> ntdll -> SSD -->
  <g class="dg-line" marker-end="url(#wa-ah)" fill="none">
    <path d="M165,48 L165,63"/><path d="M305,48 L305,63"/><path d="M445,48 L445,63"/><path d="M585,48 L585,63"/>
    <path d="M380,98 L380,111"/>
    <path d="M380,146 L380,179"/>
  </g>

  <!-- ===== mode boundary ===== -->
  <line x1="24" y1="164" x2="736" y2="164" class="dg-line" stroke-width="2.5"/>
  <text class="dg-muted" x="734" y="159" text-anchor="end" font-size="10">User mode</text>
  <text class="dg-muted" x="734" y="178" text-anchor="end" font-size="10">Kernel mode</text>

  <!-- System Service Dispatcher -->
  <rect class="dg-box" x="55" y="182" width="650" height="34" rx="4"/>
  <text class="dg-text" x="380" y="203" text-anchor="middle" font-size="11.5">System Service Dispatcher (Kernel)</text>

  <!-- ===== Executive ===== -->
  <rect class="dg-fill-surface" x="50" y="234" width="660" height="98" rx="6" opacity="0.5"/>
  <rect x="50" y="234" width="660" height="98" rx="6" fill="none" class="dg-line"/>
  <text class="dg-muted" x="702" y="248" text-anchor="end" font-size="10" font-style="italic">Executive</text>
  <g text-anchor="middle" font-size="9.5">
    <rect class="dg-box" x="62" y="256" width="100" height="60" rx="4"/>
    <text class="dg-text" x="112" y="282">I/O</text><text class="dg-text" x="112" y="294">Manager</text>
    <rect class="dg-box" x="170" y="256" width="100" height="60" rx="4"/>
    <text class="dg-text" x="220" y="276">Security</text><text class="dg-text" x="220" y="288">Reference</text><text class="dg-text" x="220" y="300">Monitor</text>
    <rect class="dg-box" x="278" y="256" width="100" height="60" rx="4"/>
    <text class="dg-text" x="328" y="282">Object</text><text class="dg-text" x="328" y="294">Manager</text>
    <rect class="dg-box" x="386" y="256" width="100" height="60" rx="4"/>
    <text class="dg-text" x="436" y="282">Memory</text><text class="dg-text" x="436" y="294">Manager</text>
    <rect class="dg-box" x="494" y="256" width="100" height="60" rx="4"/>
    <text class="dg-text" x="544" y="282">Cache</text><text class="dg-text" x="544" y="294">Manager</text>
    <rect class="dg-box" x="602" y="256" width="100" height="60" rx="4"/>
    <text class="dg-text" x="652" y="282">Other</text><text class="dg-text" x="652" y="294">managers</text>
  </g>
  <!-- SSD -> first five managers -->
  <g class="dg-line" marker-end="url(#wa-ah)" fill="none">
    <path d="M112,216 L112,255"/><path d="M220,216 L220,255"/><path d="M328,216 L328,255"/><path d="M436,216 L436,255"/><path d="M544,216 L544,255"/>
  </g>

  <!-- ===== Driver row ===== -->
  <rect class="dg-box-accent" x="60" y="352" width="206" height="48" rx="4"/>
  <text class="dg-accent" x="163" y="372" text-anchor="middle" font-size="10.5">File-system drivers</text>
  <text class="dg-muted" x="163" y="388" text-anchor="middle" font-size="9" font-family="'JetBrains Mono',monospace">ntfs.sys, refs.sys</text>
  <rect class="dg-box" x="285" y="352" width="190" height="48" rx="4"/>
  <text class="dg-text" x="380" y="372" text-anchor="middle" font-size="10.5">Filter Manager</text>
  <text class="dg-muted" x="380" y="388" text-anchor="middle" font-size="9">+ minifilters</text>
  <rect class="dg-box" x="494" y="352" width="206" height="48" rx="4"/>
  <text class="dg-text" x="597" y="372" text-anchor="middle" font-size="10.5">Lower storage drivers</text>
  <text class="dg-muted" x="597" y="388" text-anchor="middle" font-size="9" font-family="'JetBrains Mono',monospace">volmgr, disk, stornvme…</text>

  <!-- I/O Manager fans out to the three driver boxes -->
  <g class="dg-line" fill="none">
    <path d="M112,316 L112,338 L597,338"/>
  </g>
  <g class="dg-line" marker-end="url(#wa-ah)" fill="none">
    <path d="M163,338 L163,351"/><path d="M380,338 L380,351"/><path d="M597,338 L597,351"/>
  </g>

  <!-- Kernel + HAL -->
  <rect class="dg-box" x="55" y="420" width="650" height="32" rx="4"/>
  <text class="dg-text" x="380" y="440" text-anchor="middle" font-size="11">Scheduling, interrupt dispatching, etc. (Kernel)</text>
  <rect class="dg-box" x="55" y="466" width="650" height="32" rx="4"/>
  <text class="dg-text" x="380" y="486" text-anchor="middle" font-size="11">Hardware Abstraction Layer (HAL)</text>
</svg>

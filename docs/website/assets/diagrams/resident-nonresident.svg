<svg class="diagram" viewBox="0 0 760 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Resident vs non-resident storage">
<defs><marker id="rn-a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path class="dg-arrowhead" d="M0,0 L7,3 L0,6 Z"/></marker></defs>
<text class="dg-title" x="30" y="28" font-size="13" font-weight="700">Resident (small file)</text>
<rect class="dg-box" x="30" y="40" width="300" height="120" rx="8"/>
<text class="dg-muted" x="46" y="64" font-size="11">directory-entry value</text>
<rect class="dg-box-accent" x="46" y="76" width="268" height="64" rx="6"/>
<text class="dg-accent" x="180" y="104" text-anchor="middle" font-size="12">file content stored INLINE</text>
<text class="dg-muted" x="180" y="124" text-anchor="middle" font-size="10.5">no clusters allocated</text>
<text class="dg-title" x="430" y="28" font-size="13" font-weight="700">Non-resident (large file)</text>
<rect class="dg-box" x="430" y="40" width="160" height="120" rx="8"/>
<text class="dg-muted" x="446" y="64" font-size="11">directory entry</text>
<rect class="dg-box-accent" x="446" y="76" width="128" height="64" rx="6"/>
<text class="dg-accent" x="510" y="104" text-anchor="middle" font-size="11.5">extent list</text>
<text class="dg-muted" x="510" y="124" text-anchor="middle" font-size="10.5">VLCN · length</text>
<rect class="dg-box" x="630" y="60" width="100" height="26" rx="4"/><text class="dg-muted" x="680" y="78" text-anchor="middle" font-size="10.5">clusters</text>
<rect class="dg-box" x="630" y="94" width="100" height="26" rx="4"/><text class="dg-muted" x="680" y="112" text-anchor="middle" font-size="10.5">clusters</text>
<line class="dg-line" x1="590" y1="100" x2="626" y2="78" marker-end="url(#rn-a)"/>
<line class="dg-line" x1="590" y1="112" x2="626" y2="106" marker-end="url(#rn-a)"/>
</svg>

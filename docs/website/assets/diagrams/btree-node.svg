<svg class="diagram" viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ReFS B+-tree node: header, sorted index of offsets, key/value rows, and free space">
  <defs>
    <marker id="bt-arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path class="dg-arrowhead" d="M0,0 L7,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- outer node (MSB+ page) -->
  <rect class="dg-box" x="14" y="14" width="732" height="242" rx="10"/>

  <!-- header band -->
  <rect class="dg-fill-surface" x="14" y="14" width="732" height="38" rx="10"/>
  <rect class="dg-fill-surface" x="14" y="40" width="732" height="12"/>
  <text class="dg-title" x="32" y="38" font-size="13" font-weight="700">Node header</text>
  <text class="dg-muted" x="150" y="38" font-size="11.5">signature · level · key count · free-space offset</text>

  <!-- index area: sorted offset slots -->
  <text class="dg-muted" x="32" y="78" font-size="11.5" font-weight="600">Sorted index (offsets, ascending key order)</text>
  <g>
    <rect class="dg-box-accent" x="32"  y="88" width="46" height="30" rx="5"/>
    <rect class="dg-box-accent" x="86"  y="88" width="46" height="30" rx="5"/>
    <rect class="dg-box-accent" x="140" y="88" width="46" height="30" rx="5"/>
    <rect class="dg-box-accent" x="194" y="88" width="46" height="30" rx="5"/>
    <text class="dg-accent" x="55"  y="108" text-anchor="middle" font-size="11">o₀</text>
    <text class="dg-accent" x="109" y="108" text-anchor="middle" font-size="11">o₁</text>
    <text class="dg-accent" x="163" y="108" text-anchor="middle" font-size="11">o₂</text>
    <text class="dg-accent" x="217" y="108" text-anchor="middle" font-size="11">o₃</text>
  </g>

  <!-- free space note -->
  <rect class="dg-dash" x="270" y="86" width="460" height="34" rx="6"/>
  <text class="dg-muted" x="500" y="108" text-anchor="middle" font-size="11">free space — deleted rows persist here (node slack)</text>

  <!-- rows -->
  <text class="dg-muted" x="32" y="158" font-size="11.5" font-weight="600">Rows — key → value</text>
  <g>
    <rect class="dg-box" x="32"  y="168" width="150" height="68" rx="7"/>
    <rect class="dg-box" x="200" y="168" width="150" height="68" rx="7"/>
    <rect class="dg-box" x="368" y="168" width="150" height="68" rx="7"/>
    <line class="dg-line" x1="32" y1="200" x2="182" y2="200" stroke-width="1"/>
    <line class="dg-line" x1="200" y1="200" x2="350" y2="200" stroke-width="1"/>
    <line class="dg-line" x1="368" y1="200" x2="518" y2="200" stroke-width="1"/>
    <text class="dg-text" x="107" y="190" text-anchor="middle" font-size="11">key₀ (type · name)</text>
    <text class="dg-muted" x="107" y="220" text-anchor="middle" font-size="11">value₀</text>
    <text class="dg-text" x="275" y="190" text-anchor="middle" font-size="11">key₁</text>
    <text class="dg-muted" x="275" y="220" text-anchor="middle" font-size="11">value₁</text>
    <text class="dg-text" x="443" y="190" text-anchor="middle" font-size="11">key₂</text>
    <text class="dg-muted" x="443" y="220" text-anchor="middle" font-size="11">value₂</text>
    <text class="dg-muted" x="600" y="206" font-size="13">…</text>
  </g>

  <!-- offset -> row arrows -->
  <path class="dg-line" d="M55 118 C55 145, 107 150, 107 166" marker-end="url(#bt-arrow)"/>
  <path class="dg-line" d="M109 118 C109 150, 275 150, 275 166" marker-end="url(#bt-arrow)"/>
  <path class="dg-line" d="M163 118 C163 150, 443 150, 443 166" marker-end="url(#bt-arrow)"/>
</svg>

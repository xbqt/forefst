# ReFS Reference — Hugo site config
# Content under content/ is GENERATED by build.py from the docs/ tree — do not edit it by hand.
# Edit the source .md in docs/ (and this website/pages/ for Home/About), then re-run build.py.

baseURL = "https://xbpt.gitlab.io/forefst/"
languageCode = "en-us"
title = "ReFS Reference"
enableInlineShortcodes = true
enableEmoji = true

[params]
  description = "Forensic structural reference for the Resilient File System (ReFS), versions 3.4 through 3.14."
  tagline = "Forensic structural reference for ReFS 3.4–3.14"
  github = "https://github.com/xbqt/forefst"        # the public source repo
  github_tree = "https://github.com/xbqt/forefst/tree/main"   # link a directory
  github_blob = "https://github.com/xbqt/forefst/blob/main"   # link a file
  defaultTheme = "light"                            # light | dark
  # Footer coverage stamp — bump when the regression harness is re-run against a newer build.
  coverage_note = "Validated against ReFS 3.4–3.14 · latest tested build 26100.8521 (24H2)"

[markup]
  [markup.goldmark.renderer]
    unsafe = true            # docs use raw HTML in a few tables
  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      block = true
  [markup.highlight]
    noClasses = false        # use CSS classes -> light/dark chroma stylesheets
    tabWidth = 4
    guessSyntax = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

# Top navigation (stable regardless of how the .md files are reorganised).
# The "ReFS Reference" brand on the left is the link home, so there is no separate Home item.
[[menu.main]]
  name = "Concepts"
  pageRef = "/concepts"
  weight = 2
[[menu.main]]
  name = "Structures"
  pageRef = "/structures"
  weight = 3
[[menu.main]]
  name = "Attributes"
  pageRef = "/attributes"
  weight = 4
[[menu.main]]
  name = "Tools"
  pageRef = "/tools"
  weight = 5
[[menu.main]]
  name = "Glossary"
  pageRef = "/glossary"
  weight = 6
[[menu.main]]
  name = "About"
  pageRef = "/about"
  weight = 7

[outputs]
  home = ["HTML", "JSON"]    # JSON = the client-side search index

[taxonomies]              # none — keep it simple

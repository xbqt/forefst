# Mirror this repo to the GitLab `forefst` project on every change, so GitLab CI rebuilds
# the site at https://<username>.gitlab.io/forefst/ automatically.
#
# One-time setup:
#   1. Create a GitLab project named `forefst` under your account.
#   2. In GitLab: Settings -> Access Tokens -> create a Project Access Token with the
#      `write_repository` scope. Copy it.
#   3. In THIS GitHub repo: Settings -> Secrets and variables -> Actions -> New secret
#      named GITLAB_TOKEN, value = that token.
#   4. Edit the GitLab URL below to your username/project (here: xbpt/forefst).
#
# After that, every push to this repo pushes it to GitLab, whose .gitlab-ci.yml rebuilds
# the Pages site. Use the "Run workflow" button for a manual publish.

name: Mirror to GitLab (forefst site)

on:
  push:
    branches: [main]          # change to `master` if that is your default branch
  workflow_dispatch: {}       # manual "Run workflow" button

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build an LFS-free source snapshot for GitLab
        run: |
          # The repo LFS-tracks large lab disk images (analysis/samples/disks/*.raw.zst) the site does
          # NOT use. GitLab's pre-receive hook rejects any push whose LFS objects are absent, so instead
          # of mirroring the whole repo we push ONE clean snapshot: drop those images and strip all LFS
          # tracking, so the pushed commit references no LFS objects at all. (The images stay on GitHub.)
          rm -rf analysis/samples/disks
          find . -path ./.git -prune -o -name .gitattributes -print0 | xargs -0 -r sed -i '/filter=lfs/d'
          git config user.email "mirror@github-actions"
          git config user.name  "GitHub mirror"
          git checkout -q --orphan gitlab-deploy
          git add -A
          git commit -q -m "Site source snapshot from ${GITHUB_SHA}"
      - name: Push the snapshot to the GitLab forefst project
        run: |
          git push --force \
            "https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/xbpt/forefst.git" \
            gitlab-deploy:main
